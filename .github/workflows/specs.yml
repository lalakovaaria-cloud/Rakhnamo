name: Spec Lint

on:
  pull_request:
    paths:
      - '.github/specs/**.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required frontmatter fields
        run: |
          failed=0
          for file in .github/specs/*.md; do
            # Skip README and template
            [[ "$file" == *"README.md" ]] && continue
            [[ "$file" == *"_template.md" ]] && continue

            # Check title is not empty
            title=$(grep -m1 '^title:' "$file" | sed 's/title: *"//' | sed 's/".*//')
            if [[ -z "$title" || "$title" == '""' ]]; then
              echo "::error file=$file::Missing or empty 'title' field"
              failed=1
            fi

            # Check status is valid
            status=$(grep -m1 '^status:' "$file" | awk '{print $2}')
            if [[ "$status" != "draft" && "$status" != "review" && "$status" != "approved" && "$status" != "implemented" ]]; then
              echo "::error file=$file::Invalid status '$status'. Must be: draft | review | approved | implemented"
              failed=1
            fi

            # Check date format
            date=$(grep -m1 '^date:' "$file" | awk '{print $2}')
            if ! [[ "$date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "::error file=$file::Invalid or missing date '$date'. Must be YYYY-MM-DD"
              failed=1
            fi

            echo "OK: $file (status=$status)"
          done

          exit $failed
